apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: finai-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # SSL config would go here (e.g. cert-manager)
spec:
  rules:
  - host: finai.enterprise.com
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: finai-backend-svc
            port:
              number: 80
      - path: /ml
        pathType: Prefix
        backend:
          service:
            name: finai-ml-service-svc
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: finai-frontend-svc
            port:
              number: 80
