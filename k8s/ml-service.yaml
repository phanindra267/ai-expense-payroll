apiVersion: apps/v1
kind: Deployment
metadata:
  name: finai-ml-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: finai-ml-service
  template:
    metadata:
      labels:
        app: finai-ml-service
    spec:
      containers:
      - name: ml-service
        image: finai/ml-service:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: finai-ml-service-svc
spec:
  selector:
    app: finai-ml-service
  ports:
  - port: 8000
    targetPort: 8000
