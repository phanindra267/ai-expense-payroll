apiVersion: apps/v1
kind: Deployment
metadata:
  name: finai-backend
  labels:
    app: finai-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: finai-backend
  template:
    metadata:
      labels:
        app: finai-backend
    spec:
      containers:
      - name: backend
        image: finai/backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: finai-secrets
        - configMapRef:
            name: finai-config
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: finai-backend-svc
spec:
  selector:
    app: finai-backend
  ports:
  - port: 80
    targetPort: 3000
