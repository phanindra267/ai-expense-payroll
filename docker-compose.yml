version: '3.8'

services:
  # ===========================================
  # MongoDB
  # ===========================================
  mongodb:
    image: mongo:7
    container_name: ep-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ep-network

  # ===========================================
  # Redis
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: ep-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ep-network

  # ===========================================
  # Ollama (AI/LLM)
  # ===========================================
  ollama:
    image: ollama/ollama:latest
    container_name: ep-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ep-network

  # ===========================================
  # Backend API
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ep-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "9090:9090"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - ep-network

  # ===========================================
  # Frontend
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ep-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ep-network

  # ===========================================
  # Jaeger (Optional - Distributed Tracing)
  # ===========================================
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: ep-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    profiles:
      - tracing
    networks:
      - ep-network

  # ===========================================
  # ML Service (Data Science & Analytics)
  # ===========================================
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: ep-ml-service
    restart: unless-stopped
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - ep-network

  # ===========================================
  # API Gateway (Node.js)
  # ===========================================
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: ep-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - BACKEND_URL=http://backend:3000
      - ML_URL=http://ml-service:8000
      - REDIS_URL=redis://redis:6379
    depends_on:
      backend:
        condition: service_healthy
      ml-service:
        condition: service_healthy
    networks:
      - ep-network

  # ===========================================
  # Kafka (Event Streaming - KRaft Mode)
  # ===========================================
  kafka:
    image: bitnami/kafka:3.5
    container_name: ep-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - ep-network

  # ===========================================
  # PostgreSQL (Data Warehouse)
  # ===========================================
  postgres:
    image: postgres:15
    container_name: ep-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=finai
      - POSTGRES_PASSWORD=finai_secret
      - POSTGRES_DB=finai_dw
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - ep-network

  # ===========================================
  # Apache Airflow (Data Engineering ETL)
  # ===========================================
  airflow-webserver:
    image: apache/airflow:2.8.1
    container_name: ep-airflow
    restart: unless-stopped
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://finai:finai_secret@postgres/finai_dw
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    ports:
      - "8081:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    depends_on:
      - postgres
    command: webserver
    networks:
      - ep-network

  airflow-scheduler:
    image: apache/airflow:2.8.1
    container_name: ep-airflow-scheduler
    restart: unless-stopped
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://finai:finai_secret@postgres/finai_dw
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    depends_on:
      - postgres
    command: scheduler
    networks:
      - ep-network

  # ===========================================
  # ELK Stack (Observability)
  # ===========================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: ep-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - ep-network

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: ep-logstash
    ports:
      - "5044:5044"
    depends_on:
      - elasticsearch
    networks:
      - ep-network

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: ep-kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - ep-network

volumes:
  mongo-data:
  redis-data:
  ollama-data:
  kafka-data:
  pg-data:
  es-data:

networks:
  ep-network:
    driver: bridge
