apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "finai.fullname" . }}-backend
  labels:
    app.kubernetes.io/name: {{ include "finai.name" . }}-backend
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "finai.name" . }}-backend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "finai.name" . }}-backend
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: {{ .Chart.Name }}-backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: MONGO_URI
              value: "mongodb://{{ .Release.Name }}-mongodb:27017/finai"
            - name: REDIS_URL
              value: "redis://{{ .Release.Name }}-redis-master:6379"
            - name: KAFKA_BROKER
              value: "{{ .Release.Name }}-kafka:9092"
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
